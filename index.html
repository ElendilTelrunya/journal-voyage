<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Journal de Voyage</title>
<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<div id="login">

<h2>Accès au blog</h2>

<input type="password" id="password" placeholder="Mot de passe">

<button onclick="login()">Entrer</button>

</div>


<div id="site">

<header>

<div class="hamburger" onclick="toggleMenu()">☰</div>

<h1>Journal de Voyage</h1>

</header>


<nav id="menu">

<h3>Catégories</h3>

<ul id="categories"></ul>

<input id="newCategory" placeholder="Nouvelle catégorie">

<button onclick="addCategory()">Ajouter</button>

<hr>

<h3>Sous catégorie</h3>

<select id="parentCategory"></select>

<input id="newSub">

<button onclick="addSub()">Ajouter</button>

<hr>

<h3>Carte des voyages</h3>

<div id="map"></div>

<hr>

<button onclick="addMedia()">Ajouter photo / vidéo</button>

</nav>


<main>

<h2>Galerie</h2>

<div id="gallery"></div>

</main>

</div>

<script src="script.js"></script>

</body>
</html>
