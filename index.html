<!DOCTYPE html>
<html>

<head>
<title>Terra Memoria</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f4f4f4;
    margin:0;
}

.login{
    margin-top:150px;
}

input, select{
    padding:10px;
    font-size:16px;
    margin:5px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

#site{
    display:none;
}

.header{
    background:black;
    color:white;
    padding:20px 0;
}

.menu{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:15px;
}

.menu a{
    color:white;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
}

.menu a:hover{
    text-decoration:underline;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.gallery img{
    width:100%;
    border-radius:10px;
}

.map-container{
    position:relative;
    max-width:800px;
    margin:20px auto;
}

.map-container img{
    width:100%;
    border-radius:10px;
}

.map-point{
    position:absolute;
    width:20px;
    height:20px;
    background:red;
    border-radius:50%;
    cursor:pointer;
    border:2px solid white;
}

#city-form{
    margin:20px;
}

#city-list{
    margin-top:10px;
    text-align:left;
    display:inline-block;
}
</style>
</head>

<body>

<div class="login" id="login">
    <h2>Entrer le mot de passe</h2>
    <input type="password" id="password">
    <br><br>
    <button onclick="checkPassword()">Entrer</button>
</div>

<div id="site">

    <div class="header">
        <h1>Terra Memoria</h1>
        <p>Le journal de voyage de Clément ❤️</p>
        <div class="menu">
            <a href="#">Accueil</a>
            <a href="#voyages">Nos voyages</a>
            <a href="#photos">Photos</a>
            <a href="#carte">Carte</a>
        </div>
    </div>

    <h2 id="voyages">Nos voyages</h2>
    <div class="gallery" id="gallery">
        <!-- Photos initiales -->
    </div>

    <h2 id="carte">Carte du monde</h2>
    <div class="map-container" id="map-container">
        <img src="carte-monde.jpg" alt="Carte du monde" id="map">
    </div>

    <div id="city-form">
        <h3>Ajouter une ville ou région</h3>
        <input type="text" id="city-input" placeholder="Nom de la ville">
        <select id="country-select"></select>
        <button onclick="addCity()">Ajouter</button>
        <div id="city-list"></div>
    </div>

</div>

<script>
let countries = {}; // { nomDuPays: {x, y, villes: []} }
let currentCountry = null;

function checkPassword(){
    const password = document.getElementById("password").value;
    if(password=="Cybelle-1"){
        document.getElementById("login").style.display="none";
        document.getElementById("site").style.display="block";
        loadData();
        renderAllPoints();
    } else {
        alert("Mot de passe incorrect");
    }
}

// Ajouter un point en cliquant
document.getElementById('map').addEventListener('click', function(e){
    const map = e.target;
    const rect = map.getBoundingClientRect();
    const x = ((e.clientX - rect.left)/map.width)*100;
    const y = ((e.clientY - rect.top)/map.height)*100;

    const countryName = prompt("Nom du pays à ajouter ?");
    if(!countryName) return;

    // Ajouter dans countries
    if(!countries[countryName]){
        countries[countryName] = {x: x, y: y, villes: []};
    }

    renderPoint(countryName);
    updateCountrySelect();
    saveData();
});

// Crée un point rouge sur la carte
function renderPoint(countryName){
    const mapContainer = document.getElementById('map-container');
    // Vérifie si le point existe déjà
    if(document.querySelector(`.map-point[data-country="${countryName}"]`)) return;

    const point = document.createElement('div');
    point.className = 'map-point';
    point.style.left = countries[countryName].x + '%';
    point.style.top = countries[countryName].y + '%';
    point.dataset.country = countryName;
    point.onclick = () => showCountry(countryName);
    mapContainer.appendChild(point);
}
