<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Journal de Voyage</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<div id="login">

<h2>Accès au journal</h2>

<input type="password" id="password">

<button onclick="login()">Entrer</button>

</div>


<div id="site">

<header>

<div class="hamburger" onclick="toggleMenu()">☰</div>

<h1>Journal de Voyage</h1>

</header>


<nav id="menu">

<h3>Ajouter voyage</h3>

<input id="country" placeholder="Pays">

<input id="city" placeholder="Ville">

<input id="date" type="date">

<button onclick="addTrip()">Ajouter</button>

<hr>

<button onclick="addMedia()">Ajouter photo / vidéo</button>

<hr>

<button onclick="clearData()">Reset blog</button>

</nav>


<main>

<section>

<h2>Carte des voyages</h2>

<div id="map"></div>

</section>


<section>

<h2>Timeline</h2>

<div id="timeline"></div>

</section>


<section>

<h2>Galerie</h2>

<div id="gallery"></div>

</section>

</main>

</div>

<script src="script.js"></script>

</body>

</html>
