<!DOCTYPE html>
<html>

<head>
<title>Terra Memoria</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f4f4f4;
    margin:0;
}

.login{
    margin-top:150px;
}

input, select{
    padding:10px;
    font-size:16px;
    margin:5px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

#site{
    display:none;
}

.header{
    background:black;
    color:white;
    padding:20px 0;
}

.menu{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:15px;
}

.menu a{
    color:white;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
}

.menu a:hover{
    text-decoration:underline;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.gallery img{
    width:100%;
    border-radius:10px;
}

.map-container{
    position:relative;
    max-width:800px;
    margin:20px auto;
}

.map-container img{
    width:100%;
    border-radius:10px;
}

.map-point{
    position:absolute;
    width:20px;
    height:20px;
    background:red;
    border-radius:50%;
    cursor:pointer;
    border:2px solid white;
}

#city-form{
    margin:20px;
}

#city-list{
    margin-top:10px;
    text-align:left;
    display:inline-block;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
    <h2>Entrer le mot de passe</h2>
    <input type="password" id="password">
    <br><br>
    <button onclick="checkPassword()">Entrer</button>
</div>

<!-- SITE -->
<div id="site">

    <div class="header">
        <h1>Terra Memoria</h1>
        <p>Le journal de voyage de Clément ❤️</p>
        <div class="menu">
            <a href="#">Accueil</a>
            <a href="#voyages">Nos voyages</a>
            <a href="#photos">Photos</a>
            <a href="#carte">Carte</a>
        </div>
    </div>

    <h2 id="voyages">Nos voyages</h2>
    <div class="gallery" id="gallery">
        <img src="japon1.jpg" class="japon">
        <img src="japon2.jpg" class="japon">
        <img src="japon3.jpg" class="japon">
        <img src="italie1.jpg" class="italie">
        <img src="italie2.jpg" class="italie">
    </div>

    <h2 id="carte">Carte du monde</h2>
    <div class="map-container">
        <img src="carte-monde.jpg" alt="Carte du monde">
        <div class="map-point" style="top:35%; left:75%;" onclick="showCountry('japon')"></div>
        <div class="map-point" style="top:50%; left:85%;" onclick="showCountry('italie')"></div>
    </div>

    <!-- Formulaire ajout villes/régions -->
    <div id="city-form">
        <h3>Ajouter une ville ou région</h3>
        <input type="text" id="city-input" placeholder="Nom de la ville">
        <select id="country-select">
            <option value="japon">Japon</option>
            <option value="italie">Italie</option>
        </select>
        <button onclick="addCity()">Ajouter</button>
        <div id="city-list"></div>
    </div>

</div>

<script>
function checkPassword(){
    var password=document.getElementById("password").value;
    if(password=="Cybelle-1"){
        document.getElementById("login").style.display="none";
        document.getElementById("site").style.display="block";
        loadCities();
    } else {
        alert("Mot de passe incorrect");
    }
}

// Afficher uniquement les photos d'un pays
function showCountry(country){
    const images = document.querySelectorAll('#gallery img');
    images.forEach(img => {
        if(img.classList.contains(country)){
            img.style.display='block';
        } else {
            img.style.display='none';
        }
    });
    displayCities(country);
}

// Ajouter ville/région dans localStorage
function addCity(){
    const cityInput = document.getElementById('city-input').value.trim();
    const country = document.getElementById('country-select').value;
    if(cityInput==='') return;
    let cities = JSON.parse(localStorage.getItem(country)) || [];
    cities.push(cityInput);
    localStorage.setItem(country, JSON.stringify(cities));
    document.getElementById('city-input').value='';
    if(currentCountry===country) displayCities(country);
}

let currentCountry = null;

// Afficher villes pour le pays sélectionné
function displayCities(country){
    currentCountry = country;
    const cityListDiv = document.getElementById('city-list');
    let cities = JSON.parse(localStorage.getItem(country)) || [];
    let html = `<h4>Villes / Régions visités : ${country}</h4><ul>`;
    cities.forEach(c => html += `<li>${c}</li>`);
    html += '</ul>';
    cityListDiv.innerHTML = html;
}

// Charger toutes les villes au chargement
function loadCities(){
    const countries = ['japon','italie'];
    countries.forEach(c => {
        if(!localStorage.getItem(c)) localStorage.setItem(c, JSON.stringify([]));
    });
}
</script>

</body>
</html>
