<!DOCTYPE html>
<html>

<head>

<style>
body{

    text-align:center;

    margin:0;
}

.login{

}

input{
    padding:10px;

}

}

.menu a{

}

.menu a:hover{

}

/ --- GALERIE --- */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));

    padding:20px;

.gallery img{
    width:100%;

}
