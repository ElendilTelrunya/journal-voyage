<!DOCTYPE html>
<html>

<head>
<title>Terra Memoria</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
margin:0;
}

.login{
margin-top:150px;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#site{
display:none;
}

.header{
background:black;
color:white;
padding:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
gap:20px;
padding:20px;
}

.gallery img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<div class="login" id="login">

<h2>Entrer le mot de passe</h2>

<input type="password" id="password">
<br><br>

<button onclick="checkPassword()">Entrer</button>

</div>

<div id="site">

<div class="header">
<h1>Terra Memoria</h1>
<p>Nos aventures autour du monde</p>
</div>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">

</div>

</div>

<script>

function checkPassword(){

var password=document.getElementById("password").value;

if(password=="Cybelle-1"){
document.getElementById("login").style.display="none";
document.getElementById("site").style.display="block";
}

else{
alert("Mot de passe incorrect");
}

}

</script>

</body>
</html>
