<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Journal de Voyage</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <h2>Accès au journal</h2>
  <input type="password" id="password">
  <button onclick="login()">Entrer</button>
</div>

<div id="site">

<header>
  <div class="hamburger" onclick="toggleMenu()">☰</div>
  <h1>Journal de Voyage</h1>
</header>

<nav id="menu">
  <h3>Navigation</h3>
  <button onclick="showHome()">Accueil</button>
  <button onclick="showCategories()">Catégories</button>
</nav>

<main>

<section id="homePage">
  <h2>Galerie</h2>
  <button onclick="addMedia()">Ajouter photo / vidéo</button>
  <div id="gallery"></div>
</section>

<section id="categoryPage" class="hidden">
  <h2>Catégories</h2>
  <ul id="categories"></ul>
  <input id="newCategory" placeholder="Nouvelle catégorie">
  <button onclick="addCategory()">Ajouter catégorie</button>
  <hr>
  <h3>Sous-catégorie</h3>
  <select id="parentCategory"></select>
  <input id="newSub" placeholder="Sous-catégorie">
  <button onclick="addSub()">Ajouter sous-catégorie</button>
</section>

</main>

</div>

<script src="script.js"></script>
</body>
</html>
